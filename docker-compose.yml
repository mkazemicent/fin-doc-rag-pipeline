services:
  app:
    build: .
    container_name: deal-analyzer-app
    ports:
      - "8501:8501"
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
      - LLM_MODEL=${LLM_MODEL:-qwen2.5:14b}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-nomic-embed-text}
      - NUM_CTX=${NUM_CTX:-8192}
      - NUM_GPU=${NUM_GPU:-35}
      - DATA_DIR=/app/data
    volumes:
      - ./data:/app/data
    depends_on:
      - chromadb
      - ollama
    networks:
      - analyzer-network

  chromadb:
    image: chromadb/chroma:1.5.4
    container_name: deal-analyzer-chroma
    ports:
      - "8000:8000"
    volumes:
      - ./data/chroma_db:/chroma/chroma
    environment:
      - ANONYMIZED_TELEMETRY=False
    networks:
      - analyzer-network

  ollama:
    image: ollama/ollama:0.6.2
    container_name: deal-analyzer-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_storage:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    networks:
      - analyzer-network

networks:
  analyzer-network:
    driver: bridge

volumes:
  ollama_storage:
